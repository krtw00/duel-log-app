name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint & Typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @duel-log/shared build

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @duel-log/shared build

      - name: Test
        run: pnpm test
        env:
          VITE_SUPABASE_URL: https://test.supabase.co
          VITE_SUPABASE_ANON_KEY: test-anon-key

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [check]

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @duel-log/shared build

      - name: Build
        run: pnpm build
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder
          VITE_API_URL: /api

  migrate:
    name: Migrate Database
    runs-on: ubuntu-latest
    needs: [check, test, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v5

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: [check, test, build]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      STAGING_ALIAS: duel-log-staging-krtw00s-projects.vercel.app

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pull Vercel preview env for develop
        run: npx vercel pull --yes --environment=preview --git-branch=develop --token="$VERCEL_TOKEN"

      - name: Build Vercel output
        run: npx vercel build --token="$VERCEL_TOKEN"

      - name: Deploy preview and capture URL
        id: deploy
        run: |
          npx vercel deploy --prebuilt --target=preview --token="$VERCEL_TOKEN" --format=json > deploy-result.json
          DEPLOY_URL="$(jq -r '.url' deploy-result.json | sed 's#^https://##')"
          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"

      - name: Update staging alias
        run: npx vercel alias set "${{ steps.deploy.outputs.deploy_url }}" "$STAGING_ALIAS" --token="$VERCEL_TOKEN"

      - name: Write summary
        run: |
          {
            echo "## Staging Deployment"
            echo
            echo "- Deployment: https://${{ steps.deploy.outputs.deploy_url }}"
            echo "- Alias: https://$STAGING_ALIAS"
          } >> "$GITHUB_STEP_SUMMARY"
