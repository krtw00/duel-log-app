name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint & Typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @duel-log/shared build

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @duel-log/shared build

      - name: Test
        run: pnpm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [check]

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @duel-log/shared build

      - name: Build
        run: pnpm build
        env:
          VITE_API_BASE_URL: /api

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: [check, test, build]
    if: github.ref == 'refs/heads/staging' && github.event_name != 'pull_request'
    env:
      GOOGLE_CLOUD_PROJECT: ${{ vars.GOOGLE_CLOUD_PROJECT || 'oauthsetting-484201' }}
      GOOGLE_CLOUD_REGION: ${{ vars.GOOGLE_CLOUD_REGION || 'asia-northeast1' }}
      ARTIFACT_REGISTRY_REPO: ${{ vars.ARTIFACT_REGISTRY_REPOSITORY || 'apps' }}
      FIREBASE_HOSTING_SITE: ${{ vars.STAGING_FIREBASE_HOSTING_SITE || 'duel-log-staging' }}

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Write staging env
        run: |
          mkdir -p .env
          cat <<'EOF' > .env/staging
          ${{ secrets.DUEL_LOG_STAGING_ENV_FILE }}
          EOF

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          create_credentials_file: true

      - uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GOOGLE_CLOUD_PROJECT }}

      - name: Ensure staging Hosting site exists
        run: |
          if ! npx firebase-tools hosting:sites:list --project "$GOOGLE_CLOUD_PROJECT" | grep -q "$FIREBASE_HOSTING_SITE"; then
            npx firebase-tools hosting:sites:create "$FIREBASE_HOSTING_SITE" --project "$GOOGLE_CLOUD_PROJECT"
          fi

      - name: Deploy Firebase Hosting
        run: pnpm firebase:deploy:web:staging
        env:
          GOOGLE_CLOUD_PROJECT: ${{ env.GOOGLE_CLOUD_PROJECT }}
          GOOGLE_CLOUD_REGION: ${{ env.GOOGLE_CLOUD_REGION }}
          FIREBASE_HOSTING_SITE: ${{ env.FIREBASE_HOSTING_SITE }}

      - name: Write summary
        run: |
          {
            echo "## Staging Deployment"
            echo
            echo "- Frontend: https://${FIREBASE_HOSTING_SITE}.web.app"
            echo "- API: https://duel-log-api-staging.codenica.dev/api/health (codenica-vps)"
            echo "- Branch: staging"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [check, test, build]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    env:
      GOOGLE_CLOUD_PROJECT: ${{ vars.GOOGLE_CLOUD_PROJECT || 'oauthsetting-484201' }}
      GOOGLE_CLOUD_REGION: ${{ vars.GOOGLE_CLOUD_REGION || 'asia-northeast1' }}
      ARTIFACT_REGISTRY_REPO: ${{ vars.ARTIFACT_REGISTRY_REPOSITORY || 'apps' }}
      FIREBASE_HOSTING_SITE: ${{ vars.FIREBASE_HOSTING_SITE || 'duel-log' }}
      CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE || 'duel-log-api' }}

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Write production env
        run: |
          mkdir -p .env
          cat <<'EOF' > .env/production
          ${{ secrets.DUEL_LOG_PRODUCTION_ENV_FILE }}
          EOF

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          create_credentials_file: true

      - uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GOOGLE_CLOUD_PROJECT }}

      - name: Deploy Cloud Run API
        run: pnpm cloudrun:deploy-api
        env:
          GCP_PROJECT_ID: ${{ env.GOOGLE_CLOUD_PROJECT }}
          GCP_REGION: ${{ env.GOOGLE_CLOUD_REGION }}
          ARTIFACT_REGISTRY_REPO: ${{ env.ARTIFACT_REGISTRY_REPO }}
          CLOUD_RUN_SERVICE: ${{ env.CLOUD_RUN_SERVICE }}

      - name: Deploy Firebase Hosting
        run: pnpm firebase:deploy:web
        env:
          GOOGLE_CLOUD_PROJECT: ${{ env.GOOGLE_CLOUD_PROJECT }}
          GOOGLE_CLOUD_REGION: ${{ env.GOOGLE_CLOUD_REGION }}
          FIREBASE_HOSTING_SITE: ${{ env.FIREBASE_HOSTING_SITE }}
          CLOUD_RUN_SERVICE: ${{ env.CLOUD_RUN_SERVICE }}

      - name: Write summary
        run: |
          {
            echo "## Production Deployment"
            echo
            echo "- Frontend: https://duel-log.codenica.dev"
            echo "- API: https://api.duel-log.codenica.dev/api/health"
            echo "- Branch: main"
          } >> "$GITHUB_STEP_SUMMARY"
