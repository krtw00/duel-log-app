services:
  install:
    build: .
    container_name: duel-log-install
    command: pnpm install --frozen-lockfile
    working_dir: /app
    volumes:
      - .:/app:cached
      - duel_log_node_modules:/app/node_modules
      - duel_log_web_node_modules:/app/apps/web/node_modules
      - duel_log_api_node_modules:/app/packages/api/node_modules
      - duel_log_shared_node_modules:/app/packages/shared/node_modules

  db:
    image: postgres:16-alpine
    container_name: duel-log-db
    environment:
      POSTGRES_DB: duel_log_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - duel_log_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d duel_log_app"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    container_name: duel-log-web
    command: sh -c "pnpm -F @duel-log/shared build && pnpm --filter @duel-log/web dev --host 0.0.0.0"
    working_dir: /app
    volumes:
      - .:/app:cached
      - duel_log_node_modules:/app/node_modules
      - duel_log_web_node_modules:/app/apps/web/node_modules
      - duel_log_api_node_modules:/app/packages/api/node_modules
      - duel_log_shared_node_modules:/app/packages/shared/node_modules
    environment:
      - NODE_ENV=development
      - API_URL=http://api:3000
      - VITE_API_BASE_URL=http://localhost:3000/api
    depends_on:
      install:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      api:
        condition: service_started
    ports:
      - "5173:5173"

  api:
    build: .
    container_name: duel-log-api
    command: sh -c "pnpm -F @duel-log/shared build && pnpm --filter @duel-log/api dev --host 0.0.0.0"
    working_dir: /app
    volumes:
      - .:/app:cached
      - duel_log_node_modules:/app/node_modules
      - duel_log_web_node_modules:/app/apps/web/node_modules
      - duel_log_api_node_modules:/app/packages/api/node_modules
      - duel_log_shared_node_modules:/app/packages/shared/node_modules
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/duel_log_app
      - JWT_SECRET=dev-jwt-secret
      - AUTH_CALLBACK_URL=http://localhost:3000/api/auth/oauth/callback
      - WEB_URL=http://localhost:5173
    depends_on:
      install:
        condition: service_completed_successfully
      db:
        condition: service_healthy

volumes:
  duel_log_node_modules:
  duel_log_web_node_modules:
  duel_log_api_node_modules:
  duel_log_shared_node_modules:
  duel_log_pgdata:
